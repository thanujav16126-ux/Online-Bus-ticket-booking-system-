<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuickBus | Online Booking</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
    
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#">QuickBus</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link active" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">About</a></li>
                    <li class="nav-item"><a class="nav-link btn btn-warning text-dark ms-lg-3" href="#">Login</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <header class="hero-section">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-lg-10">
                    <div class="search-card shadow-lg p-5">
                        <h1 class="text-center mb-4 fw-bold">Find Your Next Trip</h1>
                        <form id="busSearchForm" class="row g-3">
                            <div class="col-md-4">
                                <label class="form-label fw-bold">From</label>
                                <input type="text" id="fromCity" class="form-control form-control-lg" placeholder="Leaving from..." required>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label fw-bold">To</label>
                                <input type="text" id="toCity" class="form-control form-control-lg" placeholder="Going to..." required>
                            </div>
                            <div class="col-md-3">
                                <label class="form-label fw-bold">Travel Date</label>
                                <input type="date" id="travelDate" class="form-control form-control-lg" required>
                            </div>
                            <div class="col-md-1 d-flex align-items-end">
                                <button type="submit" class="btn btn-orange-action btn-lg w-100">Go</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <script src="script.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

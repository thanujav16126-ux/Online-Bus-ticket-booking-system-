<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuickBus | Home</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#">QuickBus</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="#">Login</a>
                <a class="nav-link btn btn-outline-warning ms-lg-3" href="#">Register</a>
            </div>
        </div>
    </nav>

    <header class="hero-section">
        <div class="container">
            <div class="search-box shadow-lg">
                <h2 class="text-center mb-4">Book Your Bus Ticket</h2>
                <form id="searchForm" class="row g-3">
                    <div class="col-md-4">
                        <label class="form-label">From</label>
                        <input type="text" id="fromCity" class="form-control" placeholder="Source City" required>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">To</label>
                        <input type="text" id="toCity" class="form-control" placeholder="Destination City" required>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Date</label>
                        <input type="date" id="travelDate" class="form-control" required>
                    </div>
                    <div class="col-md-1 d-flex align-items-end">
                        <button type="submit" class="btn btn-orange w-100">Search</button>
                    </div>
                </form>
            </div>
        </div>
    </header>

    <script src="script.js"></script>
</body>
</html>

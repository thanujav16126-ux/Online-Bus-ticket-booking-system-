<!DOCTYPE html>
<html>
<head>

<title>Online Bus Ticket Booking</title>

<style>

body{
margin:0;
font-family:Arial;
height:100vh;
background:linear-gradient(to bottom,#f7c6a4,#f1a05d);
display:flex;
justify-content:center;
align-items:center;
}

/* Main white card */

.container{
background:white;
width:80%;
height:70%;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
display:flex;
flex-direction:column;
justify-content:flex-start;
align-items:center;
text-align:center;
position:relative;
padding:80px 40px 40px 40px;
  }

/* Bus image */

.bus{
position:absolute;
left:30px;
top:50%;
transform:translateY(-50%);
width:350px;
}

/* Heading */

h1{
font-size:45px;
color:#d35400;
margin-bottom:10px;
border-bottom:4px solid #e76f51;
display:inline-block;
padding-bottom:5px;
}

/* Subheading */

h2{
font-size:32px;
color:#e76f51;
margin-bottom:10px;
}

/* Paragraph */

p{
font-size:18px;
color:#555;
}

/* Button */

.start-btn{
position:absolute;
bottom:30px;
right:40px;
background:#e76f51;
color:white;
border:none;
padding:12px 25px;
border-radius:25px;
cursor:pointer;
font-size:16px;
}

.start-btn:hover{
background:#d35400;
}

</style>

</head>

<body>

<div class="container">

<!-- Bus Image -->
<img src="bus.png" class="bus" alt="Bus">

<h1>Welcome To</h1>

<h2>Online Bus Ticket Booking</h2>

<p>Book your journey easily and enjoy your travel.</p>

<button class="start-btn" onclick="location.href='login.html'">

Get Started

</button>

</div>

</body>
</html>

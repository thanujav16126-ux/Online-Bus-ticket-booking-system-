<!DOCTYPE html>
<html>
<head>

<title>Select Destination</title>

<style>

/* Page background */

body{
margin:0;
font-family:Arial;
height:100vh;
background:linear-gradient(to bottom,#f7c6a4,#f1a05d);
display:flex;
justify-content:center;
align-items:center;
}

/* Main container */

.container{
background:white;
width:80%;
height:70%;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
padding:40px;
position:relative;
}

/* Heading */

h1{
color:#d35400;
}

/* Location list */

.location{
margin:15px 0;
font-size:18px;
cursor:pointer;
}

/* Orange radio button */

input[type="radio"]{
accent-color:orange;
}

/* Top buttons */

.top-buttons{
position:absolute;
top:20px;
right:30px;
}

.top-buttons button{
margin-left:10px;
padding:8px 18px;
background:#e76f51;
color:white;
border:none;
border-radius:20px;
cursor:pointer;
}

/* Next button */

.next-btn{
position:absolute;
bottom:30px;
right:40px;
padding:10px 25px;
background:#e76f51;
color:white;
border:none;
border-radius:20px;
cursor:pointer;
}

/* Popup */

.popup{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.4);
justify-content:center;
align-items:center;
}

.popup-box{
background:white;
padding:20px;
border-radius:10px;
text-align:center;
}

.popup-box button{
margin-top:15px;
float:right;
}

</style>

</head>

<body>

<div class="container">

<div class="top-buttons">
<button onclick="history.back()">Back</button>
<button onclick="location.href='index.html'">Logout</button>
</div>

</label>

</div>

<!DOCTYPE html>
<html>
<head>

<title>Select Destination</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(to bottom,#f7c6a4,#f1a05d);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.container{
background:white;
width:85%;
height:75%;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
padding:40px;
position:relative;
}

h1{
color:#e76f51;
margin-bottom:10px;
}

h3{
margin-top:20px;
}

.destinations{
display:grid;
grid-template-columns:1fr 1fr 1fr;
gap:20px;
margin-top:20px;
}

.card{
border:1px solid #ddd;
border-radius:10px;
padding:15px;
cursor:pointer;
display:flex;
align-items:center;
}

.card input{
margin-right:10px;
accent-color:#e76f51;
}

.next-btn{
position:absolute;
bottom:30px;
right:40px;
padding:10px 20px;
background:#e76f51;
color:white;
border:none;
border-radius:20px;
cursor:pointer;
}

.top-buttons{
position:absolute;
top:20px;
right:20px;
}

.top-buttons button{
margin-left:10px;
padding:8px 18px;
background:#e76f51;
color:white;
border:none;
border-radius:20px;
cursor:pointer;
}

.popup{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.4);
justify-content:center;
align-items:center;
}

.popup-box{
background:white;
padding:20px;
border-radius:10px;
text-align:center;
}

.popup-box button{
margin-top:10px;
float:right;
}

</style>

</head>

<body>

<div class="container">

<div class="top-buttons">
<button onclick="location.href='login.html'">Back</button>
<button onclick="location.href='index.html'">Logout</button>
</div>

<h1>Select Your Destination</h1>

<h3>Select Boarding Point</h3>

<div class="destinations">

<label class="card">
<input type="radio" name="location" value="Pune">
Pune – 150 km away from Mumbai
</label>

<label class="card">
<input type="radio" name="location" value="Nashik">
Nashik – 300 km away from Mumbai
</label>

<label class="card">
<input type="radio" name="location" value="Aurangabad">
Aurangabad – 470 km away from Mumbai
</label>

<label class="card">
<input type="radio" name="location" value="Solapur">
Solapur – 690 km away from Mumbai
</label>

<label class="card">
<input type="radio" name="location" value="Hyderabad">
Hyderabad – 990 km away from Mumbai
</label>

<label class="card">
<input type="radio" name="location" value="Bangalore">
Bangalore – 1580 km away from Mumbai
</label>

</div>

<button class="next-btn" onclick="nextPage()">Next</button>

</div>

<div class="popup" id="popup">
<div class="popup-box">
<p>Please select location</p>
<button onclick="closePopup()">OK</button>
</div>
</div>

<script>

function nextPage(){

let selected=document.querySelector('input[name="location"]:checked');

if(!selected){
document.getElementById("popup").style.display="flex";
return;
}

window.location.href="seats.html";

}

function closePopup(){
document.getElementById("popup").style.display="none";
}

</script>

</body>
  </html>

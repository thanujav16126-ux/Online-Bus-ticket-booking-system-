<!DOCTYPE html>
<html>
<head>

<title>User Login</title>

<style>

/* Page background */

body{
margin:0;
font-family:Arial;
height:100vh;
background:linear-gradient(to bottom,#f7c6a4,#f1a05d);
display:flex;
justify-content:center;
align-items:center;
}

/* White container */

.container{
background:white;
width:85%;
height:75%;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
position:relative;
padding:40px;
}

/* Heading */

h1{
color:#e76f51;
border-bottom:3px solid #e76f51;
padding-bottom:5px;
margin-bottom:30px;
}

/* Form rows */

.form-row{
display:flex;
align-items:center;
justify-content:center;
margin:12px 0;
}

.form-row label{
width:150px;
text-align:right;
margin-right:15px;
}

/* Inputs */

.form-row input{
width:260px;
padding:10px;
border-radius:5px;
border:1px solid #ccc;
}

/* Mandatory star */

.star{
color:red;
}

/* Buttons */

.login-btn{
position:absolute;
bottom:30px;
right:40px;
padding:10px 20px;
background:#e76f51;
color:white;
border:none;
border-radius:20px;
cursor:pointer;
}

.back-btn{
position:absolute;
top:20px;
right:20px;
padding:8px 18px;
background:#e76f51;
color:white;
border:none;
border-radius:20px;
cursor:pointer;
}

/* Popup */

.popup{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.4);
justify-content:center;
align-items:center;
}

.popup-box{
background:white;
padding:20px;
border-radius:10px;
text-align:center;
}

.popup-box button{
margin-top:15px;
float:right;
}

</style>

</head>

<body>

<div class="container">

<button class="back-btn" onclick="location.href='index.html'">Back</button>

<h1>User Login</h1>

<div class="form-row">
<label>Name <span class="star">*</span></label>
<input type="text" id="name">
</div>

<div class="form-row">
<label>Phone Number <span class="star">*</span></label>
<input type="text" id="phone">
</div>

<div class="form-row">
<label>Email</label>
<input type="email" id="email">
</div>

<button class="login-btn" onclick="validateLogin()">Login</button>

</div>

<!-- Popup -->

<div class="popup" id="popup">

<div class="popup-box">

<p id="popup-message"></p>

<button onclick="closePopup()">OK</button>

</div>

</div>

<script>

function showPopup(message){
document.getElementById("popup-message").innerText = message;
document.getElementById("popup").style.display = "flex";
}

function closePopup(){
document.getElementById("popup").style.display = "none";
}

function validateLogin(){

let name=document.getElementById("name").value;
let phone=document.getElementById("phone").value;

if(name=="" || phone==""){
showPopup("Please enter the details");
return;
}

let phonePattern=/^[0-9]{10}$/;

if(!phonePattern.test(phone)){
showPopup("Please enter valid phone number");
return;
}

showPopup("Login successful");

setTimeout(function(){
window.location.href="destination.html";
},1500);

}

</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<title>User Login</title>

<style>

body{
margin:0;
font-family:Arial;
height:100vh;
background:linear-gradient(to bottom,#f7c6a4,#f1a05d);
display:flex;
justify-content:center;
align-items:center;
}

/* White box */

.login-box{
background:white;
width:400px;
padding:40px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
text-align:center;
position:relative;
}

/* Heading */

h1{
color:#d35400;
border-bottom:4px solid #e76f51;
display:inline-block;
padding-bottom:5px;
margin-bottom:30px;
}

/* Input fields */

input{
width:100%;
padding:10px;
margin:10px 0;
border-radius:8px;
border:1px solid #ccc;
font-size:16px;
}

/* Buttons */

.back-btn{
position:absolute;
bottom:20px;
left:20px;
background:#aaa;
color:white;
border:none;
padding:10px 20px;
border-radius:20px;
cursor:pointer;
}

.login-btn{
position:absolute;
bottom:20px;
right:20px;
background:#e76f51;
color:white;
border:none;
padding:10px 20px;
border-radius:20px;
cursor:pointer;
}

.login-btn:hover{
background:#d35400;
}

</style>

</head>

<body>

<div class="login-box">

<h1>User Login</h1>
  <label>Username</label>
<input type="text" placeholder="Enter username">

<label>Password</label>
<input type="password" placeholder="Enter password">
  <label>Name</label>
<input type="text" id="name" placeholder="Enter your name">

<label>Phone Number</label>
<input type="text" id="phone" placeholder="Enter phone number">

<label>Email</label>
<input type="email" id="email" placeholder="Enter email">

<button class="login-btn" onclick="validateLogin()">Login</button>

<button class="back-btn" onclick="location.href='index.html'">
Back
</button>

<button class="login-btn">
Login
</button>

</div>
  <script>

function validateLogin(){

let name = document.getElementById("name").value;
let phone = document.getElementById("phone").value;
let email = document.getElementById("email").value;

/* Check empty */

if(name=="" || phone=="" || email==""){
alert("Please enter all details");
return;
}

/* Name validation */

let namePattern = /^[A-Za-z ]+$/;

if(!namePattern.test(name)){
alert("Enter valid name");
return;
}

/* Phone validation */

let phonePattern = /^[0-9]{10}$/;

if(!phonePattern.test(phone)){
alert("Enter valid phone number");
return;
}

/* Success */

alert("Login successful");

}

  </script>

</body>
  </html>

<!DOCTYPE html>
<html>
<head>

<title>Select Destination</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(to bottom,#f7c6a4,#f1a05d);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.container{
background:white;
width:85%;
height:75%;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
padding:40px;
position:relative;
}

h1{
color:#e76f51;
margin-bottom:10px;
}

h3{
margin-top:20px;
}

/* Boarding dropdown */

select{
width:300px;
padding:10px;
border-radius:6px;
border:1px solid #ccc;
margin-top:10px;
}

/* Grid layout */

.destinations{
display:grid;
grid-template-columns:1fr 1fr 1fr;
gap:30px;
margin-top:20px;
}

/* Destination cards */

.card{
border:1px solid #ddd;
border-radius:12px;
padding:20px;
cursor:pointer;
display:flex;
align-items:flex-start;
gap:12px;
background:#fafafa;
}

.card input{
margin-top:6px;
accent-color:#e76f51;
}

.place b{
font-size:18px;
display:block;
}

.place p{
margin:3px 0;
font-size:14px;
color:#555;
}

/* Buttons */

.next-btn{
position:absolute;
bottom:30px;
right:40px;
padding:10px 20px;
background:#e76f51;
color:white;
border:none;
border-radius:20px;
cursor:pointer;
}

.top-buttons{
position:absolute;
top:20px;
right:20px;
}

.top-buttons button{
margin-left:10px;
padding:8px 18px;
background:#e76f51;
color:white;
border:none;
border-radius:20px;
cursor:pointer;
}

/* Popup */

.popup{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.4);
justify-content:center;
align-items:center;
}

.popup-box{
background:white;
padding:20px;
border-radius:10px;
text-align:center;
}

.popup-box button{
margin-top:10px;
float:right;
}

</style>

</head>

<body>

<div class="container">

<div class="top-buttons">
<button onclick="location.href='login.html'">Back</button>
<button onclick="location.href='index.html'">Logout</button>
</div>

<h1>Select Your Destination</h1>

<h3>Select Boarding Point</h3>

<select id="boardingPoint">
<option value="">Select Boarding Point</option>
<option>Mumbai Bus Stand</option>
<option>Pune Bus Stand</option>
<option>Nashik Bus Stand</option>
<option>Aurangabad Bus Stand</option>
<option>Solapur Bus Stand</option>
<option>Hyderabad Bus Stand</option>
<option>Bangalore Bus Stand</option>
</select>

<h3>Select Destination</h3>

<div class="destinations">

<label class="card">
<input type="radio" name="location" value="Pune">
<div class="place">
<b>Pune</b>
<p>150 km</p>
<p>away from Mumbai</p>
</div>
</label>

<label class="card">
<input type="radio" name="location" value="Nashik">
<div class="place">
<b>Nashik</b>
<p>300 km</p>
<p>away from Mumbai</p>
</div>
</label>

<label class="card">
<input type="radio" name="location" value="Aurangabad">
<div class="place">
<b>Aurangabad</b>
<p>470 km</p>
<p>away from Mumbai</p>
</div>
</label>

<label class="card">
<input type="radio" name="location" value="Solapur">
<div class="place">
<b>Solapur</b>
<p>690 km</p>
<p>away from Mumbai</p>
</div>
</label>

<label class="card">
<input type="radio" name="location" value="Hyderabad">
<div class="place">
<b>Hyderabad</b>
<p>990 km</p>
<p>away from Mumbai</p>
</div>
</label>

<label class="card">
<input type="radio" name="location" value="Bangalore">
<div class="place">
<b>Bangalore</b>
<p>1580 km</p>
<p>away from Mumbai</p>
</div>
</label>

</div>

<button class="next-btn" onclick="nextPage()">Next</button>

</div>

<!-- Popup -->

<div class="popup" id="popup">
<div class="popup-box">
<p>Please select boarding point and destination</p>
<button onclick="closePopup()">OK</button>
</div>
</div>

<!-- External JavaScript -->

<script src="login.js"></script>

</body>
  </html>

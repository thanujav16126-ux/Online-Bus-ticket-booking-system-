<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BusGo - Online Ticket Booking</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-container">
        <main class="card">
            <header class="logo-container">
                <div class="logo-icon">🚌</div>
                <span class="logo-text">BusGo</span>
            </header>

            <div class="content-wrapper">
                <div class="image-section">
                    <img src="https://cdn-icons-png.flaticon.com/512/3448/3448339.png" alt="Bus Illustration" class="bus-img">
                </div>

                <div class="text-section">
                    <h1>Welcome <br> <span>to</span></h1>
                    <h2>Online Bus Ticket Booking System</h2>
                    <p>Book your journey easily and travel comfortable to your destination.</p>
                </div>
            </div>

            <footer class="card-footer">
                <button class="btn-get-started">Get Started &rarr;</button>
            </footer>
        </main>
    </div>
</body>
</html>

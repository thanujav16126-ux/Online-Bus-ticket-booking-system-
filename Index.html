<!DOCTYPE html>
<html>
<head>
<title>Online Bus Ticket Booking</title>

<style>

body{
margin:0;
font-family:Arial, sans-serif;
background:linear-gradient(135deg,#eaa46a,#f6c8a1);
}

/* White box */
.container{
background:white;
width:85%;
height:75vh;
margin:2cm auto;
border-radius:15px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
padding:40px;
position:relative;
display:flex;
align-items:center;
}

/* Bus image */
.bus img{
width:320px;
}

/* Text section */
.text{
margin-left:60px;
max-width:450px;
}

/* Welcome */
.welcome{
font-size:55px;
color:#e76f00;
font-weight:bold;
}

/* Title */
.title{
font-size:28px;
margin-top:10px;
}

/* Description */
.desc{
color:#e76f00;
font-size:20px;
margin-top:10px;
}

/* Button */
.button{
position:absolute;
bottom:3cm;
right:3cm;
}

.button a{
background:#e76f00;
color:white;
padding:14px 30px;
border-radius:25px;
text-decoration:none;
font-size:18px;
}

.button a:hover{
background:#c85e00;
}

</style>
</head>

<body>

<div class="container">

<div class="bus">
<img src="bus.png">
</div>

<div class="text">

<div class="welcome">
WELCOME TO
</div>

<div class="title">
Online Bus Ticket Booking System
</div>

<div class="desc">
Get your journey booked easily and travel
comfortably to your destination.
</div>

</div>

<div class="button">
<a href="login.html">Get Started →</a>
</div>

</div>

</body>
</html>
